name: cancal-rollback
description: |-
  1. Trigger upgrade once the Locust warmup is done
  2. Trigger rollback when pending TRP >= 40%
  3. Cancel rollback when active TRP >= 80%

# At this stage, we can keep RayService config simple.
# So, you don't need to modify this section.
rayservice:
  name: simple-locust
  namespace: default
  yaml: ../rayservice_simple.yaml

locust:
  locustfile: ../locustfile_simple.py
  users: 10
  spawn_rate: 10
  web_port: 8089
  # You might need to lower the RPS threshold based on your test environment.
  warmup_rps: 1000
  warmup_stable_seconds: 15

actions:
  - name: upgrade
    # TODO(jwj): Any problem with small CPU like 500m? RPS will drop dramatically (~200).
    # 500m -> RPS drops
    # 1750m -> Insufficient CPU
    worker_cpu: "1.25"

  - name: rollback
    when:
      pending_trp_gte: 40
    worker_cpu: "2"

  - name: cancel_rollback
    when:
      active_trp_gte: 80
    worker_cpu: "1.25"

completion:
  active_trp: 100
  # Must meet the folloiwng conditions.
  # upgrading: false
  # rolling_back: false
  # pending_cluster_empty: true

timeouts:
  rayservice_ready: 120
  locust_warmup: 120
  action: 300
  completion: 300
