name: third-spec
description: |-
  Expected process: A -> B -> A -> C
  Action triggering conditions:
    1. Trigger upgrade once the Locust warmup is done
    2. Trigger rollback when pending TRP >= 40%
    3. Trigger upgrade again with a new cluster spec when active TRP >= 80%

rayservice:
  name: simple-locust
  namespace: default
  yaml: ../ray-service.conservative.yaml

locust:
  locustfile: ../locustfile_simple.py
  users: 10
  spawn_rate: 10
  web_port: 8089
  # You might need to lower the RPS threshold based on your test environment.
  warmup_rps: 1000
  warmup_stable_seconds: 15

actions:
  - name: upgrade
    worker_cpu: "1.25"

  - name: rollback
    when:
      pending_trp_gte: 40
    worker_cpu: "2"

  - name: upgrade # Or a new action called upgrade_new_spec? 
    when:
      active_trp_gte: 80
    worker_cpu: "1"

completion:
  active_trp: 100
  worker_cpu: "1"
  # Must meet the folloiwng conditions.
  # upgrading: false
  # rolling_back: false
  # pending_cluster_empty: true

timeouts:
  rayservice_ready: 120
  locust_warmup: 120
  action: 300
  completion: 300
