apiVersion: ray.io/v1
kind: RayService
metadata:
  name: simple-locust
spec:
  upgradeStrategy:
    type: NewClusterWithIncrementalUpgrade
    clusterUpgradeOptions:
      gatewayClassName: istio
      stepSizePercent: 10
      intervalSeconds: 30
      maxSurgePercent: 20
  serveConfigV2: |
    applications:
      - name: simple_app
        import_path: simple_serve.app
        route_prefix: /test
        runtime_env:
          working_dir: "https://github.com/jiangjiawei1103/incr-upgrade-locust/archive/main.zip"
        deployments:
          - name: SimpleDeployment
            autoscaling_config:
              min_replicas: 1
              max_replicas: 2
            ray_actor_options:
              num_cpus: 0.5
  rayClusterConfig:
    rayVersion: "2.49.2"
    enableInTreeAutoscaling: true
    headGroupSpec:
      rayStartParams: {}
      template:
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray:2.49.2
              resources:
                requests:
                  cpu: "2"
                  memory: "3Gi"
                limits:
                  cpu: "2"
                  memory: "3Gi"
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
    workerGroupSpecs:
      - groupName: small-group
        replicas: 1
        minReplicas: 1
        maxReplicas: 4
        rayStartParams:
          num-cpus: "1"
        template:
          spec:
            containers:
              - name: ray-worker
                image: rayproject/ray:2.49.2
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]
                resources:
                  requests:
                    cpu: "300m"
                    memory: "1Gi"
                  limits:
                    cpu: "500m"
                    memory: "1Gi"
